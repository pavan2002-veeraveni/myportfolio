# Fly.io configuration for Pavan Kumar Portfolio
app = 'pavan-kumar-portfolio'
primary_region = 'maa'  # Chennai, India (closest to you)

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
